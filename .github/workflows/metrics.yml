name: Full GitHub Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Full Detailed Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: huuhiep-dev
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Ho_Chi_Minh
          
          # Lịch đóng góp 3D (Chạy rất ổn định)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Thống kê ngôn ngữ chi tiết (Chạy rất ổn định)
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          
          # Các dự án nổi bật 
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_types: commit, pull_request
          
          # Hiển thị các Topic công nghệ dưới dạng icon
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

          # Điểm đánh giá (Star, Follower, v.v.)
          plugin_lines: yes

          # TẠM THỜI TẮT CÁC PLUGIN BỊ LỖI API 
          plugin_achievements: no
          plugin_habits: no